services:
  # Tidak ada service "db" tersendiri di sini - backend Docker sengaja
  # disambungkan ke MySQL yang sama dengan yang dipakai backend Laragon
  # (host.docker.internal menunjuk ke MySQL di mesin host), supaya cuma ada
  # SATU sumber data dan tidak ada lagi seed data ganda yang beda dari data asli.
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: finstart-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_NAME: finstart_db
      DB_USER: root
      DB_PASSWORD: ""
      DB_POOL_SIZE: 10
      CORS_ORIGIN: http://localhost:8080
      AUTH_SESSION_HOURS: 8
      AUTH_LOGIN_MAX_ATTEMPTS: 5
      AUTH_LOGIN_LOCK_MINUTES: 1
      DEMO_USER_EMAIL: 
      DEMO_USER_NAME: "Finance Manager"
      DEMO_USER_PASSWORD: "12345678"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
    container_name: finstart-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      PORT: 8080
    ports:
      - "8080:8080"
